name: Build & Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.1)'
        required: true
        default: '1.0.0-test'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Extraire la version depuis le tag ou l'input ──────────
      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ── Python 3.12 ───────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── Dépendances ───────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard ordered-set

      # ── Cache Nuitka ──────────────────────────────────────────
      # Stocke les objets C compilés entre les runs.
      # Premier build : ~35 min. Builds suivants : ~3-6 min.
      # Cache invalidé si un .py ou requirements.txt change.
      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuitka-cache
          key: nuitka-win-py312-${{ hashFiles('**/*.py', 'requirements.txt') }}
          restore-keys: |
            nuitka-win-py312-

      # ── Build Nuitka --onedir ──────────────────────────────────
      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyqt6 `
            --include-package=skyfield `
            --include-package-data=skyfield `
            --windows-console-mode=disable `
            --output-filename=MoonPredictions.exe `
            --output-dir=build `
            --jobs=2 `
            --nofollow-import-to=tkinter `
            --assume-yes-for-downloads `
            main.py
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

      # ── Installer NSIS ────────────────────────────────────────
      - name: Install NSIS
        run: choco install nsis --no-progress -y

      # ── Build installeur NSIS ─────────────────────────────────
      # /DPRODUCT_VERSION override la valeur "1.0.0" dans installer.nsi
      - name: Build NSIS installer
        run: |
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DPRODUCT_VERSION=${{ env.VERSION }} installer.nsi

      # ── Vérification ──────────────────────────────────────────
      - name: Verify installer exists
        run: |
          $installer = "MoonPredictions-Setup-${{ env.VERSION }}.exe"
          if (!(Test-Path $installer)) {
            Write-Error "Installer not found: $installer"
            exit 1
          }
          $size = [math]::Round((Get-Item $installer).Length / 1MB, 1)
          Write-Host "OK — Installer: $installer ($size MB)"

      # ── Upload artefact non signé pour SignPath ───────────────
      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: MoonPredictions-Setup-${{ env.VERSION }}.exe
          retention-days: 5

      # ── Signature SignPath Foundation ─────────────────────────
      # Skippé automatiquement si les secrets ne sont pas encore configurés
      # (avant approbation SignPath). Les builds fonctionnent normalement.
      - name: Sign with SignPath Foundation
        id: signpath
        if: |
          env.SIGNPATH_API_TOKEN != '' &&
          env.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'moon-predictions'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed/
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}

      # ── Préparer l'asset de release ───────────────────────────
      - name: Prepare release asset
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          if [ -d "signed/" ] && ls signed/*.exe 2>/dev/null; then
            cp signed/*.exe "MoonPredictions-Setup-${VERSION}.exe"
            echo "Using SIGNED installer"
          else
            echo "Using UNSIGNED installer (SignPath not yet configured)"
          fi

      # ── Générer SHA256 ────────────────────────────────────────
      - name: Generate SHA256
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          sha256sum "MoonPredictions-Setup-${VERSION}.exe" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ── Créer la GitHub Release ───────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Moon Predictions v${{ env.VERSION }}"
          body: |
            ## Moon Predictions v${{ env.VERSION }}

            Application de prévision des passages lunaires pour les radioamateurs EME.

            ### Téléchargement Windows
            → Télécharger `MoonPredictions-Setup-${{ env.VERSION }}.exe`

            ### Première utilisation
            Au premier lancement, Skyfield télécharge automatiquement les éphémérides
            JPL DE440s (~32 Mo). Connexion Internet requise uniquement cette fois.

            ### Signature de code
            Free code signing provided by [SignPath.io](https://signpath.io),
            certificate by [SignPath Foundation](https://signpath.org).

          files: |
            MoonPredictions-Setup-${{ env.VERSION }}.exe
            SHA256SUMS.txt
          draft: false
          prerelease: false
