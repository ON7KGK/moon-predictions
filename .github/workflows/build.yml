name: Build & Sign

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 1.0.1)'
        required: true
        default: '1.0.0-test'

jobs:
  # ════════════════════════════════════════════════════════════════
  # Windows — Nuitka + NSIS installer + SignPath
  # ════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard ordered-set

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuitka-cache
          key: nuitka-win-py312-${{ hashFiles('**/*.py', 'requirements.txt') }}
          restore-keys: |
            nuitka-win-py312-

      - name: Patch version
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"$VERSION\"/" main.py
          sed -i "s/^APP_DATE = .*/APP_DATE = \"$DATE\"/" main.py
          echo "Patched APP_VERSION=$VERSION APP_DATE=$DATE"
          grep "^APP_VERSION\|^APP_DATE" main.py

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyqt6 `
            --include-package=skyfield `
            --include-package-data=skyfield `
            --windows-console-mode=disable `
            --windows-icon-from-ico=moon.ico `
            --output-filename=MoonPredictions.exe `
            --output-dir=build `
            --jobs=2 `
            --nofollow-import-to=tkinter `
            --assume-yes-for-downloads `
            main.py
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build NSIS installer
        run: |
          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /DPRODUCT_VERSION=${{ env.VERSION }} installer.nsi

      - name: Verify installer exists
        run: |
          $installer = "MoonPredictions-Setup-${{ env.VERSION }}.exe"
          if (!(Test-Path $installer)) {
            Write-Error "Installer not found: $installer"
            exit 1
          }
          $size = [math]::Round((Get-Item $installer).Length / 1MB, 1)
          Write-Host "OK — Installer: $installer ($size MB)"

      - name: Upload unsigned artifact
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: MoonPredictions-Setup-${{ env.VERSION }}.exe
          retention-days: 5

      - name: Sign with SignPath Foundation
        id: signpath
        if: |
          env.SIGNPATH_API_TOKEN != '' &&
          env.SIGNPATH_ORGANIZATION_ID != ''
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'moon-predictions'
          signing-policy-slug: 'release-signing'
          github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed/
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}

      - name: Prepare release asset
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          if [ -d "signed/" ] && ls signed/*.exe 2>/dev/null; then
            cp signed/*.exe "MoonPredictions-Setup-${VERSION}.exe"
            echo "Using SIGNED installer"
          else
            echo "Using UNSIGNED installer (SignPath not yet configured)"
          fi

      - name: Generate SHA256
        shell: bash
        run: |
          VERSION="${{ env.VERSION }}"
          sha256sum "MoonPredictions-Setup-${VERSION}.exe" > SHA256SUMS-windows.txt
          cat SHA256SUMS-windows.txt

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            MoonPredictions-Setup-${{ env.VERSION }}.exe
            SHA256SUMS-windows.txt
          retention-days: 5

  # ════════════════════════════════════════════════════════════════
  # Linux — Nuitka standalone + tar.gz
  # ════════════════════════════════════════════════════════════════
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf ccache \
            libegl1 libgl1-mesa-glx libglib2.0-0 libfontconfig1 \
            libxkbcommon0 libdbus-1-3

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka zstandard ordered-set

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.nuitka-cache
          key: nuitka-linux-py312-${{ hashFiles('**/*.py', 'requirements.txt') }}
          restore-keys: |
            nuitka-linux-py312-

      - name: Patch version
        run: |
          VERSION="${{ env.VERSION }}"
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^APP_VERSION = .*/APP_VERSION = \"$VERSION\"/" main.py
          sed -i "s/^APP_DATE = .*/APP_DATE = \"$DATE\"/" main.py

      - name: Build with Nuitka
        run: |
          python -m nuitka \
            --standalone \
            --enable-plugin=pyqt6 \
            --include-package=skyfield \
            --include-package-data=skyfield \
            --output-filename=MoonPredictions \
            --output-dir=build \
            --jobs=2 \
            --nofollow-import-to=tkinter \
            --assume-yes-for-downloads \
            main.py
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache

      - name: Package tar.gz
        run: |
          VERSION="${{ env.VERSION }}"
          cd build/main.dist
          tar czf "../../MoonPredictions-${VERSION}-linux-x64.tar.gz" .
          cd ../..
          ls -lh "MoonPredictions-${VERSION}-linux-x64.tar.gz"

      - name: Generate SHA256
        run: |
          VERSION="${{ env.VERSION }}"
          sha256sum "MoonPredictions-${VERSION}-linux-x64.tar.gz" > SHA256SUMS-linux.txt
          cat SHA256SUMS-linux.txt

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            MoonPredictions-${{ env.VERSION }}-linux-x64.tar.gz
            SHA256SUMS-linux.txt
          retention-days: 5

  # ════════════════════════════════════════════════════════════════
  # macOS — désactivé : Nuitka ne supporte pas PyQt6 sur macOS
  # Nécessite migration vers PySide6 (API compatible)
  # TODO: réactiver quand PySide6 sera intégré
  # ════════════════════════════════════════════════════════════════

  # ════════════════════════════════════════════════════════════════
  # Release — rassemble Windows + Linux
  # ════════════════════════════════════════════════════════════════
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge SHA256
        run: |
          cat artifacts/release-*/SHA256SUMS-*.txt > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Moon Predictions v${{ env.VERSION }}"
          body: |
            ## Moon Predictions v${{ env.VERSION }}

            Application de prévision des passages lunaires pour les radioamateurs EME.

            ### Téléchargements
            | Plateforme | Fichier |
            |---|---|
            | Windows | `MoonPredictions-Setup-${{ env.VERSION }}.exe` |
            | Linux x64 | `MoonPredictions-${{ env.VERSION }}-linux-x64.tar.gz` |

            ### Première utilisation
            Au premier lancement, Skyfield télécharge automatiquement les éphémérides
            JPL DE440s (~32 Mo). Connexion Internet requise uniquement cette fois.

            ### Linux
            ```bash
            mkdir MoonPredictions && tar xzf MoonPredictions-*-linux-x64.tar.gz -C MoonPredictions
            ./MoonPredictions/MoonPredictions
            ```

          files: |
            artifacts/release-windows/MoonPredictions-Setup-${{ env.VERSION }}.exe
            artifacts/release-linux/MoonPredictions-${{ env.VERSION }}-linux-x64.tar.gz
            SHA256SUMS.txt
          draft: false
          prerelease: false
